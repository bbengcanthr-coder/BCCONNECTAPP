<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BCMEETING</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #000000;
            --text-muted: #666666;
            --border-color: #e5e5e5;
            --hover-bg: #f9f9f9;
            --accent: #000000;
            --notification: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f0f2f5;
            color: var(--text-main);
            line-height: 1.5;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-color);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-weight: 600;
            font-size: 1.25rem;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            transition: opacity 0.2s;
        }

        .icon-btn:active { opacity: 0.5; }

        .notification-dot {
            position: absolute;
            top: 2px;
            right: 4px;
            width: 8px;
            height: 8px;
            background-color: var(--notification);
            border-radius: 50%;
            border: 2px solid var(--bg-color);
        }

        /* Composer */
        .composer {
            padding: 20px;
            border-bottom: 8px solid #f5f5f5;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .username-input {
            width: auto;
            border: none;
            font-family: 'Prompt', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-main);
            background: #f5f5f5;
            padding: 6px 12px;
            border-radius: 20px;
            outline: none;
            display: inline-block;
        }

        .username-input::placeholder { color: #999; }

        .post-input {
            width: 100%;
            border: none;
            resize: none;
            font-family: 'Prompt', sans-serif;
            font-size: 1.05rem;
            outline: none;
            min-height: 60px;
            margin-top: 8px;
        }
        
        .post-input::placeholder { color: #aaa; }

        .composer-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .btn-submit {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 24px;
            font-family: 'Prompt', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .btn-submit:active { transform: scale(0.96); }

        /* Feed */
        .feed { padding-bottom: 40px; }

        .post-card {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.3s;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .post-author {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .post-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .post-content {
            font-size: 1rem;
            margin-bottom: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .post-actions {
            display: flex;
            gap: 20px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: 'Prompt', sans-serif;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .action-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
        .action-btn.active svg { fill: var(--text-main); stroke: var(--text-main); }
        .action-btn.active { color: var(--text-main); font-weight: 500; }

        /* Comments Section (Hidden by Default) */
        .comments-section {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed var(--border-color);
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .comment-item {
            margin-bottom: 12px;
            background: #f9f9f9;
            padding: 10px 14px;
            border-radius: 12px;
        }

        .comment-author {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 2px;
        }

        .comment-text {
            font-size: 0.9rem;
            color: #333;
        }

        .comment-input-wrapper {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .comment-input {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 16px;
            font-family: 'Prompt', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        .comment-input:focus { border-color: var(--text-main); }

        /* Loading Overlay */
        .loading {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.8);
            display: none;
            justify-content: center;
            padding-top: 40px;
            z-index: 50;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--text-main);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="logo">BCCONNECT</div>
        <div class="header-actions">
            <button class="icon-btn" onclick="randomizeFeed()" title="Randomize Feed">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 3 21 3 21 8"></polyline>
                    <line x1="4" y1="20" x2="21" y2="3"></line>
                    <polyline points="21 16 21 21 16 21"></polyline>
                    <line x1="15" y1="15" x2="21" y2="21"></line>
                    <line x1="4" y1="4" x2="9" y2="9"></line>
                </svg>
            </button>
            <button class="icon-btn" onclick="alert('ไม่มีการแจ้งเตือนใหม่ในขณะนี้')" title="Notifications">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <div class="notification-dot" id="noti-dot"></div>
            </button>
        </div>
    </header>

    <div class="composer">
        <div class="input-group">
            <input type="text" id="username-input" class="username-input" placeholder="@username" autocomplete="off">
        </div>
        <textarea id="post-input" class="post-input" placeholder="มีอะไรมาแชร์ให้คอมมูนิตี้ฟังบ้าง..."></textarea>
        <div class="composer-footer">
            <button class="btn-submit" onclick="createPost()">POST</button>
        </div>
    </div>

    <div class="loading" id="loading-spinner">
        <div class="spinner"></div>
    </div>

    <div class="feed" id="feed-container">
        </div>
</div>

<script>
    // การจำลองฐานข้อมูล (เตรียมความพร้อมสำหรับเชื่อมต่อ Firebase)
    // TODO: แทนที่ Local Array ด้วย Firebase Firestore
    let postsDB = [
        {
            id: 'post-1',
            author: '@executive_01',
            content: 'สรุปวาระการประชุมวันนี้: \n1. ทิศทางของไตรมาสถัดไป\n2. การปรับปรุงระบบหลังบ้าน\nใครมีข้อเสนอแนะเพิ่มเติมสามารถพิมพ์ทิ้งไว้ได้เลยครับ',
            time: '10 นาทีที่แล้ว',
            likes: 12,
            isLiked: false,
            comments: [
                { author: '@dev_lead', text: 'เรื่องระบบหลังบ้าน ขออนุญาตเพิ่มวาระเรื่องการทำ Migration ด้วยครับ' }
            ]
        },
        {
            id: 'post-2',
            author: '@creative_mind',
            content: 'ศุกร์นี้มีใครสนใจไปนั่งทำงานชิลๆ ที่คาเฟ่ย่านอารีย์บ้างไหม? หาแนวร่วมเปลี่ยนบรรยากาศครับ ☕️',
            time: '1 ชั่วโมงที่แล้ว',
            likes: 24,
            isLiked: true,
            comments: [
                { author: '@marketing_p', text: 'ไปด้วยคนครับ เล็งร้านไหนไว้เป็นพิเศษไหม?' },
                { author: '@creative_mind', text: 'เล็งร้าน F.I.X ไว้ครับ กาแฟดี โต๊ะทำงานสะดวก' }
            ]
        },
        {
            id: 'post-3',
            author: '@hr_admin',
            content: 'ประกาศ: อย่าลืมกรอกแบบฟอร์มประเมิน KPI ภายในสิ้นเดือนนี้นะคะ เพื่อให้กระบวนการดำเนินไปอย่างราบรื่น ขอบคุณความร่วมมือของทุกคนค่ะ',
            time: '3 ชั่วโมงที่แล้ว',
            likes: 45,
            isLiked: false,
            comments: []
        }
    ];

    // ฟังก์ชัน Render โพสต์ทั้งหมด
    function renderFeed() {
        const container = document.getElementById('feed-container');
        container.innerHTML = '';

        postsDB.forEach(post => {
            const postEl = document.createElement('div');
            postEl.className = 'post-card';
            
            // HTML สำหรับคอมเมนต์
            let commentsHTML = '';
            post.comments.forEach(comment => {
                commentsHTML += `
                    <div class="comment-item">
                        <div class="comment-author">${comment.author}</div>
                        <div class="comment-text">${comment.text}</div>
                    </div>
                `;
            });

            postEl.innerHTML = `
                <div class="post-header">
                    <div class="post-author">${post.author}</div>
                    <div class="post-time">${post.time}</div>
                </div>
                <div class="post-content">${post.content}</div>
                <div class="post-actions">
                    <button class="action-btn ${post.isLiked ? 'active' : ''}" onclick="toggleLike('${post.id}')">
                        <svg viewBox="0 0 24 24">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                        <span id="like-count-${post.id}">${post.likes}</span>
                    </button>
                    <button class="action-btn" onclick="toggleComments('${post.id}')">
                        <svg viewBox="0 0 24 24">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span>${post.comments.length}</span>
                    </button>
                </div>
                <div class="comments-section" id="comments-${post.id}">
                    ${commentsHTML}
                    <div class="comment-input-wrapper">
                        <input type="text" class="comment-input" id="new-comment-${post.id}" placeholder="เขียนคอมเมนต์...">
                        <button class="btn-submit" style="padding: 4px 16px; font-size: 0.8rem;" onclick="addComment('${post.id}')">ส่ง</button>
                    </div>
                </div>
            `;
            container.appendChild(postEl);
        });
    }

    // สร้างโพสต์ใหม่
    function createPost() {
        let username = document.getElementById('username-input').value.trim();
        let content = document.getElementById('post-input').value.trim();

        if (!content) {
            alert('กรุณาพิมพ์ข้อความก่อนโพสต์');
            return;
        }

        if (!username.startsWith('@')) {
            username = '@' + (username || 'anonymous');
        }

        const newPost = {
            id: 'post-' + Date.now(),
            author: username,
            content: content,
            time: 'เมื่อสักครู่',
            likes: 0,
            isLiked: false,
            comments: []
        };

        // TODO: Firebase -> db.collection("posts").add(newPost)
        postsDB.unshift(newPost);
        
        // Clear inputs
        document.getElementById('post-input').value = '';
        
        // Hide notification dot just as an interaction feedback
        document.getElementById('noti-dot').style.display = 'none';
        
        renderFeed();
    }

    // ฟังก์ชันเปิด/ปิด การแสดงคอมเมนต์ (ซ่อนไว้จนกว่าจะกดดู ตามที่รีเควส)
    function toggleComments(postId) {
        const section = document.getElementById(`comments-${postId}`);
        if (section.style.display === 'block') {
            section.style.display = 'none';
        } else {
            section.style.display = 'block';
        }
    }

    // ฟังก์ชันเพิ่มคอมเมนต์
    function addComment(postId) {
        const inputEl = document.getElementById(`new-comment-${postId}`);
        const text = inputEl.value.trim();
        let username = document.getElementById('username-input').value.trim();
        
        if (!username.startsWith('@')) username = '@' + (username || 'anonymous');

        if (text) {
            const postIndex = postsDB.findIndex(p => p.id === postId);
            if (postIndex > -1) {
                // TODO: Firebase -> อัปเดต Array หรือ Subcollection ของคอมเมนต์
                postsDB[postIndex].comments.push({
                    author: username,
                    text: text
                });
                renderFeed();
                // เปิดคอมเมนต์ค้างไว้หลังคอมเมนต์เสร็จ
                document.getElementById(`comments-${postId}`).style.display = 'block';
            }
        }
    }

    // ฟังก์ชันกดไลก์
    function toggleLike(postId) {
        const post = postsDB.find(p => p.id === postId);
        if (post) {
            post.isLiked = !post.isLiked;
            post.likes += post.isLiked ? 1 : -1;
            renderFeed();
        }
    }

    // ฟังก์ชันสุ่มและรีเฟรชหน้าฟีด (จำลองการสุ่มโพสต์)
    function randomizeFeed() {
        const loader = document.getElementById('loading-spinner');
        loader.style.display = 'flex';
        
        setTimeout(() => {
            postsDB.sort(() => Math.random() - 0.5);
            renderFeed();
            loader.style.display = 'none';
        }, 600); // ดีเลย์เพื่อสร้างประสบการณ์ใช้งาน (UX) เหมือนโหลดข้อมูลใหม่
    }

    // เริ่มต้นแสดงผล
    renderFeed();
</script>

</body>
</html>
